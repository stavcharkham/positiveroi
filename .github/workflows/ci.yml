name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from the "packageManager" field in package.json (pnpm 11).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Turbo check (lint + typecheck + test + build)
        run: pnpm check

  db:
    name: Database suite (migrations from zero + RLS isolation)
    runs-on: ubuntu-latest
    # TODO(ci): harden and remove continue-on-error. Wiring env from
    # `supabase status` on top of a db-only stack is brittle, and the web
    # integration tests this job runs land from a parallel build track.
    # This job is the project's standing security review (RLS isolation,
    # idempotency, key auth); it must become a required check once green.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Ensure supabase config exists
        run: '[ -f supabase/config.toml ] || supabase init'
      - name: Start local stack (applies supabase/migrations from zero)
        # The integration tests need Auth + the API, not just Postgres, so
        # this starts the full local stack; it applies every migration file
        # in order and fails the job on the first broken one.
        run: supabase start -x studio
      - name: Run web integration tests against the local stack
        run: |
          # Export whatever the local stack reports (API_URL, ANON_KEY,
          # SERVICE_ROLE_KEY, DB_URL); fall back to the CLI defaults.
          eval "$(supabase status -o env 2>/dev/null || true)"
          export NEXT_PUBLIC_SUPABASE_URL="${API_URL:-${SUPABASE_URL:-http://127.0.0.1:54321}}"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="${ANON_KEY:-${SUPABASE_ANON_KEY:-}}"
          export SUPABASE_SERVICE_ROLE_KEY="${SERVICE_ROLE_KEY:-${SUPABASE_SERVICE_ROLE_KEY:-}}"
          export DATABASE_URL="${DB_URL:-postgresql://postgres:postgres@127.0.0.1:54322/postgres}"
          # github-actions reporter surfaces failures as annotations readable
          # without log access; default reporter keeps the full log readable.
          pnpm --filter web exec vitest run --reporter=default --reporter=github-actions

  plugin:
    name: Claude plugin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run plugin tests (node test runner, no deps)
        run: node --test packages/claude-plugin/test/
