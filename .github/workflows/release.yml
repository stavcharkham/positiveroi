name: Release

on:
  push:
    branches: [main]

concurrency: release

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Changesets release
    # enable after npm org exists. Flip this to `true` once the @positiveroi
    # npm scope is created, an NPM_TOKEN secret is set, and .changeset/config.json
    # is in place. Until then the vendored plugin bundle is the distribution path.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build publishable packages
        run: pnpm turbo run build --filter='./packages/*'
      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
